<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NJ Transit Rail Analytics{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>

  <!-- Minimalist Header (Navigation Bar) -->
  <header class="header-nav">
    <a href="{{ url_for('index') }}" class="brand-wrapper">
      <div class="brand-logo"><span class="accent">NJ Transit</span> Analytics</div>
    </a>
    
    <nav class="nav-links">
      <a href="{{ url_for('index') }}" class="nav-link {% if active == 'home' or active == 'predict' %}active{% endif %}">Predictor</a>
      <a href="{{ url_for('dashboard') }}" class="nav-link {% if active == 'dashboard' or active == 'analysis' %}active{% endif %}">Analytics Dashboard</a>
      <a href="{{ url_for('about') }}" class="nav-link {% if active == 'about' %}active{% endif %}">API Docs</a>
    </nav>
  </header>

  <!-- Main Content Wrapper -->
  <div class="app-container">
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
    
    <footer class="footer-text">
      &copy; 2026 NJ Transit Analytics · Powered by Random Forest & Flask
    </footer>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
