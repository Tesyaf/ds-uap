{% extends "base.html" %}

{% block title %}Overview — RailAnalytics{% endblock %}

{% block content %}

<!-- Hero Section -->
<section class="hero" id="predictor">
  <div class="page-wrapper" style="width: 100%; max-width: var(--max-w); padding: 0;">
    <div class="hero-content">
      <h1 class="hero-title">Predicting Efficiency, Enhancing Commutes.</h1>
      <p class="hero-subtitle">Sistem informasi analitik pintar berbasis Random Forest untuk memprediksi status ketepatan waktu kereta NJ Transit secara real-time.</p>
    </div>
  </div>
</section>

<!-- Floating Interactive Prediction Widget -->
<div class="prediction-widget-container">
  <div class="glass-card">
    <div class="widget-header">
      <button class="widget-tab active" data-tab="tab-predict">
        Prediksi Delay
      </button>
      <button class="widget-tab" data-tab="tab-line-analytics">
        Performa Jalur
      </button>
      <button class="widget-tab" data-tab="tab-api-status">
        Status API
      </button>
    </div>
    
    <div class="widget-body">
      <!-- Tab 1: Predict Delay -->
      <div class="tab-pane active" id="tab-predict">
        <form class="predict-inline-form">
          <div class="form-inputs-grid">
            <div class="widget-form-group span-2">
              <label class="widget-form-label">Stasiun Asal</label>
              <select name="from_id" class="widget-form-select">
                {% for sid, sname in stations %}
                <option value="{{ sid }}" {% if sid|string == '105' %}selected{% endif %}>{{ sname }} ({{ sid }})</option>
                {% endfor %}
              </select>
            </div>
            
            <div class="widget-form-group span-2">
              <label class="widget-form-label">Stasiun Tujuan</label>
              <select name="to_id" class="widget-form-select">
                {% for sid, sname in stations %}
                <option value="{{ sid }}" {% if sid|string == '38187' %}selected{% endif %}>{{ sname }} ({{ sid }})</option>
                {% endfor %}
              </select>
            </div>
            
            <div class="widget-form-group span-2">
              <label class="widget-form-label">Jalur Kereta</label>
              <select name="line" class="widget-form-select">
                {% for line in lines %}
                <option value="{{ line }}">{{ line }}</option>
                {% endfor %}
              </select>
            </div>
            
            <div class="widget-form-group span-2">
              <label class="widget-form-label">Tipe Layanan</label>
              <select name="type" class="widget-form-select">
                {% for t in type_names %}
                <option value="{{ t }}">{{ t }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="widget-form-group span-2">
              <label class="widget-form-label">Jam Keberangkatan</label>
              <input type="time" name="departure_time" class="widget-form-input" id="departure-time" />
            </div>

            <div class="widget-form-group">
              <label class="widget-form-label">Urutan Stop</label>
              <input type="number" name="stop_sequence" class="widget-form-input" value="5" min="1" max="26" />
            </div>

            <div class="widget-form-group">
              <label class="widget-form-label">Akhir Pekan?</label>
              <select name="is_weekend" class="widget-form-select">
                <option value="0">Tidak (Weekday)</option>
                <option value="1">Ya (Weekend)</option>
              </select>
            </div>
          </div>
          
          <div class="widget-form-row-footer">
            <button type="submit" class="btn-predict">
              <span class="spinner"></span>
              <span class="btn-text">Prediksi Sekarang</span>
            </button>
          </div>
        </form>
        
        <!-- Prediction results container -->
        <div id="widget-result-container" class="widget-result-wrapper"></div>
      </div>
      
      <!-- Tab 2: Line Analytics -->
      <div class="tab-pane" id="tab-line-analytics">
        <div id="line-analytics-list" class="line-analytics-compact">
          <!-- Populated by JS -->
        </div>
      </div>
      
      <!-- Tab 3: API Status -->
      <div class="tab-pane" id="tab-api-status">
        <div id="api-status-list" class="api-status-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
